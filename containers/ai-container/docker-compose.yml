services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-container
    # Load environment variables from .env file (create from .env.example)
    env_file:
      - .env
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    ports:
      - "4097:4096"
    volumes:
      - ./data/home/data/ai-doctor-notes:/home/aiuser/Codes/ai-doctor/notes
      - ./data/home/Codes/buwai-ai-extension:/home/aiuser/Codes/buwai-ai-extension
      - ./data/home/.cache/opencode:/home/aiuser/.cache/opencode
      - ./data/home/.config/opencode:/home/aiuser/.config/opencode
      - ./data/home/.local/share/opencode:/home/aiuser/.local/share/opencode
      - ./data/home/.local/state/opencode:/home/aiuser/.local/state/opencode
    working_dir: /home/aiuser/Codes
    restart: on-failure:5
    command: >
      bash -c "
      cd /home/aiuser/Codes/ai-doctor &&
      mkdir -p notes &&
      /home/aiuser/.opencode/bin/opencode web --hostname 0.0.0.0 --port 4096 --unmatched-request-proxy http://74.120.173.111:4173
      "
